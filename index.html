<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">
        <div class="login-card">

            <div class="logo">
                <div class="telegram-icon">✈</div>
            </div>

            <h1>Telegram</h1>
            <p>Please confirm your country code and enter your phone number.</p>

            <form>
                <input type="text" placeholder="Country" value="India" required>

                <div class="phone-group">
                    <input type="text" class="country-code" placeholder="+91" required>
                    <input type="tel" class="phone-number" placeholder="Phone Number" required>
                </div>

                <button type="submit">Next</button>
            </form>

        </div>
    </div>

</body>
</html>
